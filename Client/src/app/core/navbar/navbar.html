<nav class="navbar" *transloco="let t">
  <a class="brand" href="/" aria-label="Captain Crave home">
    <img src="captain_crave.png" alt="Captain Crave logo" />
    <span>Captain Crave</span>
  </a>

  <form class="search-box" role="search">
    <mat-icon class="search-icon">search</mat-icon>
    <input type="text" [placeholder]="t('navbar.search')" />
  </form>

  <div class="navbar-actions">
    <button class="notification-btn" type="button" aria-label="Notifications">
      <mat-icon class="notification-icon">notifications</mat-icon>
    </button>

<div class="auth-buttons">
  @if (authService.user()) {
    <span class="user-name">
      {{ authService.user()?.name }}
    </span>

    <button class="signin-btn" type="button" (click)="logout()">
      Logout
    </button>
  } @else {
    <button class="signin-btn" type="button" routerLink="/login">
      {{ t("navbar.signIn") }}
    </button>

    <button class="register-btn" type="button" routerLink="/register">
      {{ t("navbar.register") }}
    </button>
  }
</div>

    <div class="language-select">
      <select
        [value]="currentLang()"
        (change)="setLang($any($event.target).value)"
        aria-label="Select language"
      >
        <option value="en">{{ t("navbar.lang.en") }}</option>
        <option value="da">{{ t("navbar.lang.da") }}</option>
      </select>
    </div>
  </div>
</nav>
