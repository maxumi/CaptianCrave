<section class="home-page">
  <div class="home-card">
    <h1>Captain Crave</h1>
    <p>Simple food discovery app for browsing restaurants and checking details.</p>

    @if (authService.user(); as user) {
      <p class="status">Signed in as {{ user.name }}</p>

      <div class="actions">
        <a routerLink="/restaurants">View restaurants</a>
      </div>
    } @else {
      <div class="actions">
        <a routerLink="/login">Login</a>
        <a routerLink="/register">Register</a>
      </div>
    }
  </div>
</section>
